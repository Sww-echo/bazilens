name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx tsc --noEmit -p tsconfig.app.json

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm test
        # tsx --test with no test files would fail; this guard keeps CI green
        # when the project has no Node test files yet.
        continue-on-error: false
        if: hashFiles('tests/*.test.ts') != ''

  build:
    name: Vite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
